<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeTrade AI | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="background-radial"></div>
    
    <div class="container">
        <header>
            <div class="logo">PrimeTrade <span>AI</span></div>
            <p class="subtitle">Secure Backend Intern Assessment</p>
        </header>

        <main>
            <div class="auth-card glass">
                <div class="auth-tabs">
                    <button id="loginTab" class="tab-btn active">Login</button>
                    <button id="registerTab" class="tab-btn">Register</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="input-group">
                        <label for="l-email">Email Address</label>
                        <input type="email" id="l-email" placeholder="name@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="l-password">Password</label>
                        <input type="password" id="l-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="input-group">
                        <label for="r-name">Full Name</label>
                        <input type="text" id="r-name" placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="r-email">Email Address</label>
                        <input type="email" id="r-email" placeholder="name@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="r-password">Password</label>
                        <input type="password" id="r-password" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label for="r-role">Role</label>
                        <select id="r-role">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
                </form>

                <div id="authMessage" class="message"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 PrimeTrade AI. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
